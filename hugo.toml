title = "ServiMariae"
baseURL = 'https://marcello1099.github.io/servi-mariae/'

languageCode = 'en-us'
defaultContentLanguage = "en-gb"
enableEmoji = true

theme = "servi-mariae"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

############################## English language ################################
[Languages.en-gb]
  languageName = "English"
  languageCode = "en-gb"
  contentDir = "content/en"
  weight = 1

  [Languages.en-gb.menu]
  [[Languages.en-gb.menu.main]]
    pageRef = "/"
    name = 'Home'
    url = '/'
    weight = 10
  [[Languages.en-gb.menu.main]]
    pageRef = "posts"
    name = 'Posts'
    url = '/posts/'
    weight = 20
  [[Languages.en-gb.menu.main]]
    pageRef = "about"
    name = 'About'
    url = '/about/'
    weight = 30

[Languages.en-gb.params]
  description = "A Catholic."
  mainSections = ['posts']

  [Languages.en-gb.params.author]
    avatar = "avatar.png"
    name = "ServiMariae"
    description = "Catholic reflections — Ad Iesum per Mariam"

[Languages.en-gb.params.webmanifest]
  name = "ServiMariae"
  short_name = "ServiMariae"
  start_url = "/"
  theme_color = "#1d3a8a"
  background_color = "#fbf7f0"
  display = "standalone"