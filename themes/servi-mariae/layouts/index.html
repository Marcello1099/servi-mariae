{{ define "main" }}
<section class="hero wrap">
  <img class="emblem" src="{{ "avatar.png" | relURL }}" alt="ServiMariae">
  <h1>{{ site.Title }}</h1>
  <p class="lede">A Catholic journal.</p>
  <p class="tagline">Beati mundo corde</p>
</section>

<div class="wrap">
  {{ partial "posts-list.html" . }}
  {{ if not (where .Pages "Section" "posts") }}
    <p style="text-align:center;color:var(--muted);">No posts yet.</p>
  {{ end }}
</div>
{{ end }}
