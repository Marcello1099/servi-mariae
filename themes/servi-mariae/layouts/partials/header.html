<header class="site-header">
  <div class="inner">
    <a href="{{ "/" | relURL }}" class="brand">
      <img class="logo" src="{{ "avatar.png" | relURL }}" alt="ServiMariae">
      <span>ServiMariae</span>
    </a>
    <nav class="nav">
      {{- range site.Menus.main }}
      <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
      {{- end -}}
      {{- $translations := .AllTranslations -}}
      {{- if gt (len $translations) 1 -}}
      <span class="sep" aria-hidden="true"></span>
      {{- range $translations -}}
      <a class="lang{{ if eq .Language.Lang $.Language.Lang }} active{{ end }}" href="{{ .RelPermalink }}" hreflang="{{ .Language.Lang }}" lang="{{ .Language.Lang }}">{{ index (split .Language.Lang "-") 0 | upper }}</a>
      {{- end -}}
      {{- end -}}
    </nav>
  </div>
</header>
