{{- $title := .title | default site.Title -}}
<section class="hero wrap">
  {{- if not .meta -}}<img class="emblem" src="{{ "avatar.png" | relURL }}" alt="ServiMariae">{{- end -}}
  {{- with .meta -}}<p class="meta">{{ . | safeHTML }}</p>{{- end -}}
  <h1>{{ $title }}</h1>
  {{- with .lede -}}<p class="lede">{{ . }}</p>{{- end -}}
  {{- with .tagline -}}<p class="tagline">{{ . }}</p>{{- end -}}
</section>
