<header class="site-header">
  <div class="inner">
    <a href="{{ "/" | relURL }}" class="brand">
      <img class="logo" src="{{ "avatar.png" | relURL }}" alt="ServiMariae">
      <span>ServiMariae</span>
    </a>
    <nav class="nav">
      {{- range site.Menus.main }}
      <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
      {{- end }}
    </nav>
    {{- if gt (len .AllTranslations) 1 -}}
    <nav class="lang-switch" aria-label="Language">
      {{- range .AllTranslations -}}
      <a href="{{ .RelPermalink }}"{{ if eq .Language.Lang $.Language.Lang }} class="active"{{ end }}>{{ .Language.LanguageName }}</a>
      {{- end -}}
    </nav>
    {{- end -}}
  </div>
</header>
