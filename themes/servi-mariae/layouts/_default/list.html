{{ define "main" }}
<section class="hero wrap">
  <img class="emblem" src="{{ "avatar.png" | relURL }}" alt="ServiMariae">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
</section>

{{ if .Content }}
<div class="wrap post-content">{{ .Content }}</div>
{{ end }}

<div class="wrap">
  {{ partial "posts-list.html" . }}
</div>
{{ end }}
